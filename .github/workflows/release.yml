name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 生成 Changelog
      - name: Generate Changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Build binaries
        run: |
          VERSION=${{ github.ref_name }}

          # Windows AMD64
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o opencode-dmxapi-${VERSION}-windows-amd64.exe

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o opencode-dmxapi-${VERSION}-linux-amd64

          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o opencode-dmxapi-${VERSION}-linux-arm64

          # macOS AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o opencode-dmxapi-${VERSION}-macos-amd64

          # macOS ARM64
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o opencode-dmxapi-${VERSION}-macos-arm64

      # 创建 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenCode DMXAPI ${{ github.ref_name }}
          body: |
            ## OpenCode DMXAPI 配置工具 ${{ github.ref_name }}

            一键配置 OpenCode 使用 DMXAPI 服务的跨平台工具。

            ---

            ${{ steps.changelog.outputs.content }}

            ---

            ### 📥 下载

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | x64 | `opencode-dmxapi-${{ github.ref_name }}-windows-amd64.exe` |
            | Linux | x64 | `opencode-dmxapi-${{ github.ref_name }}-linux-amd64` |
            | Linux | ARM64 | `opencode-dmxapi-${{ github.ref_name }}-linux-arm64` |
            | macOS | Intel | `opencode-dmxapi-${{ github.ref_name }}-macos-amd64` |
            | macOS | Apple Silicon | `opencode-dmxapi-${{ github.ref_name }}-macos-arm64` |

            ---

            ### 🛠️ 安装说明

            #### Windows
            ```powershell
            .\opencode-dmxapi-${{ github.ref_name }}-windows-amd64.exe
            ```

            #### Linux (x64)
            ```bash
            chmod +x opencode-dmxapi-${{ github.ref_name }}-linux-amd64
            ./opencode-dmxapi-${{ github.ref_name }}-linux-amd64
            ```

            #### Linux (ARM64)
            ```bash
            chmod +x opencode-dmxapi-${{ github.ref_name }}-linux-arm64
            ./opencode-dmxapi-${{ github.ref_name }}-linux-arm64
            ```

            #### macOS (Intel)
            ```bash
            chmod +x opencode-dmxapi-${{ github.ref_name }}-macos-amd64
            # 移除隔离属性（首次运行需要）
            xattr -dr com.apple.quarantine opencode-dmxapi-${{ github.ref_name }}-macos-amd64
            ./opencode-dmxapi-${{ github.ref_name }}-macos-amd64
            ```

            #### macOS (Apple Silicon)
            ```bash
            chmod +x opencode-dmxapi-${{ github.ref_name }}-macos-arm64
            # 移除隔离属性（首次运行需要）
            xattr -dr com.apple.quarantine opencode-dmxapi-${{ github.ref_name }}-macos-arm64
            ./opencode-dmxapi-${{ github.ref_name }}-macos-arm64
            ```

            ---

            ### 🔗 相关链接

            - [获取 API Token](https://www.dmxapi.cn/token)
            - [使用文档](https://cnb.cool/dmxapi/opencode_dmxapi)
          files: |
            opencode-dmxapi-${{ github.ref_name }}-windows-amd64.exe
            opencode-dmxapi-${{ github.ref_name }}-linux-amd64
            opencode-dmxapi-${{ github.ref_name }}-linux-arm64
            opencode-dmxapi-${{ github.ref_name }}-macos-amd64
            opencode-dmxapi-${{ github.ref_name }}-macos-arm64
